name: "Selve Configurator"
description: "Web-based configurator for the Selve USB-RF Gateway – manage devices, groups, sensors, senders, IVEO controllers, senSim, firmware, and gateway settings."
version: "2.0.0"
slug: "selve_configurator"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
init: false
hassio_api: true
homeassistant_api: true
auth_api: true
ports:
  8199/tcp: 8199
webui: "http://[HOST]:[PORT:8199]/"
options:
  device_port: "/dev/ttyUSB0"
schema:
  device_port: str
uart: true